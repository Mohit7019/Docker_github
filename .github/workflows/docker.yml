name: first github actions

on: 
  push:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t mohitgowda/docker-flask-app:v1 .

      - name: Run Docker Container
        run: docker run -d -p 5000:5000 mohitgowda/docker-flask-app:v1